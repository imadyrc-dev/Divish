<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Card</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
            background: #000;
        }

        /* Cover */

        .cover {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            perspective: 1800px;
            background: #949494;
            z-index: 10;
        }

        .topImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;

            transform-origin: top;
            transition: 1.4s cubic-bezier(.65, -0.2, .25, 1.3);

            z-index: 3;
            backface-visibility: hidden;
        }

        .bottomImage {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;

            transform-origin: bottom;
            transition: 1.4s cubic-bezier(.65, -0.2, .25, 1.3);

            z-index: 2;
            backface-visibility: hidden;
        }

        /* Open Animation */

        .cover.open .topImage {
            transform: rotateX(-170deg) translateY(-10px);
        }

        .cover.open .bottomImage {
            transform: rotateX(170deg) translateY(10px);
        }

        /* Main Card */

        .main {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            visibility: hidden;
            opacity: 0;
            transition: 1s;
        }

        .main.show {
            visibility: visible;
            opacity: 1;
        }

        /* Every section is nothing but a full-bleed image */

        .img-section {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            opacity: 0;
            transform: translateY(40px) scale(1.02);
            transition: opacity 1s ease, transform 1s ease;
        }

        .img-section.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .img-section img {
            width: 100%;
            height: 100vh;
            display: block;
            object-fit: cover;
        }

        #flower-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 999;
        }

        .flower {
            position: absolute;
            top: -80px;
            font-size: 18px !important;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            opacity: .95;
        }

        @keyframes fall {
            0% {
                transform: translateY(-80px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: .9;
            }
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, .9);
            color: #8b5a2b;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .2);
            z-index: 1000;
        }

        .music-btn.playing {
            background: #8b5a2b;
            color: #fff;
        }

        .music-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="cover" id="cover">
        <img src="top.png" class="topImage">
        <img src="bottom.png" class="bottomImage">
    </div>

    <!-- Main Card (revealed after cover opens) -->
    <div class="main" id="main">



        <section class="img-section">
            <div id="flower-container"></div><img src="1.jpg" alt="">
        </section>
        <section class="img-section"><img src="2.jpg" alt=""></section>
        <section class="img-section"><img src="3.jpg" alt=""></section>
        <section class="img-section"><img src="4.jpg" alt=""></section>
        <section class="img-section"><img src="5.jpg" alt=""></section>
        <section class="img-section"><img src="6.jpg" alt=""></section>
        <section class="img-section"><img src="7.jpg" alt=""></section>
        <section class="img-section"><img src="8.jpg" alt=""></section>
        <section class="img-section"><img src="9.jpg" alt=""></section>
        <section class="img-section"><img src="10.jpg" alt=""></section>


    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Button -->
    <button id="musicBtn" class="music-btn">
        <i class="fa-solid fa-volume-xmark"></i>
    </button>

    <script>

        const cover = document.getElementById("cover");
        const main = document.getElementById("main");
        const flowerContainer = document.getElementById("flower-container");
        const music = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");

        let isPlaying = false;

        // --- Reveal main card when the cover is clicked ---
        cover.addEventListener("click", () => {

            cover.classList.add("open");

            setTimeout(() => {
                main.classList.add("show");
            }, 900);

            setTimeout(() => {
                cover.style.display = "none";
            }, 1600);

            music.play().catch(() => {
                // Autoplay can still be blocked by the browser; the button lets the user start it manually
            });
            isPlaying = true;
            musicBtn.innerHTML = '<i class="fa-solid fa-music"></i>';
            musicBtn.classList.add("playing");

        });

        // --- Manual music toggle button ---
        musicBtn.addEventListener("click", () => {

            if (isPlaying) {
                music.pause();
                musicBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                musicBtn.classList.remove("playing");
            } else {
                music.play();
                musicBtn.innerHTML = '<i class="fa-solid fa-music"></i>';
                musicBtn.classList.add("playing");
            }

            isPlaying = !isPlaying;

        });

        // --- Flower Rain ---
        const flowers = ["🌸", "🌺", "🌼", "🌹"];

        function createFlower() {
            const flower = document.createElement("div");
            flower.className = "flower";
            flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];

            flower.style.left = Math.random() * 100 + "vw";
            flower.style.fontSize = (20 + Math.random() * 35) + "px";

            const duration = 10 + Math.random() * 5; // Faster fall
            flower.style.animationDuration = duration + "s";
            flower.style.animationDelay = "0s"; // Start immediately

            flowerContainer.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, duration * 1000);
        }

        // Create some flowers instantly on page load
        for (let i = 0; i < 4; i++) {
            createFlower();
        }

        // Create a new flower every 0.1 second (100ms)
        setInterval(createFlower, 100);

        // --- Scroll-in reveal for each full-bleed image section ---
        const observer = new IntersectionObserver((entries) => {

            entries.forEach(entry => {

                if (entry.isIntersecting) {
                    entry.target.classList.add("visible");
                    observer.unobserve(entry.target);
                }

            });

        }, { threshold: 0.25 });

        document.querySelectorAll(".img-section").forEach(el => observer.observe(el));

    </script>

</body>

</html>
